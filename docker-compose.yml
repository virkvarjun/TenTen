# Local Postgres for Meridian development.
# Start with `pnpm db:up`; the connection string matches DATABASE_URL in .env.example.

services:
  postgres:
    image: postgres:16-alpine
    container_name: meridian-postgres
    restart: unless-stopped
    environment:
      POSTGRES_USER: meridian
      POSTGRES_PASSWORD: meridian
      POSTGRES_DB: meridian
    ports:
      - "5432:5432"
    volumes:
      - meridian-pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U meridian -d meridian"]
      interval: 5s
      timeout: 5s
      retries: 5

volumes:
  meridian-pgdata:
